<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Gradient for Left Brain (Biological) -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE047" /> <!-- Yellow 300 -->
      <stop offset="100%" stop-color="#B45309" /> <!-- Amber 700 -->
    </linearGradient>
    
    <!-- Cyan Gradient for Right Brain (Technology) -->
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9" /> <!-- Cyan 300 -->
      <stop offset="100%" stop-color="#0369A1" /> <!-- Sky 700 -->
    </linearGradient>
    
    <!-- Outer Glow Filters -->
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left Hemisphere (Organic / Cortex) -->
  <g stroke="url(#gold)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow-gold)">
    <!-- Main Cortex Fold -->
    <path d="M 124 210 C 70 210, 30 170, 30 115 C 30 60, 70 30, 120 30 C 124 30, 124 40, 124 50" />
    <path d="M 124 90 C 80 90, 60 110, 60 140 C 60 160, 80 180, 124 180" />
    
    <!-- Inner Neural Pathways -->
    <path d="M 124 135 C 100 135, 90 145, 90 155" />
    <path d="M 95 65 C 75 75, 70 95, 80 115" />
    
    <!-- Biological Nodes -->
    <circle cx="80" cy="115" r="5" fill="url(#gold)" />
    <circle cx="95" cy="65" r="5" fill="url(#gold)" />
    <circle cx="90" cy="155" r="5" fill="url(#gold)" />
  </g>

  <!-- Right Hemisphere (Tech / Circuits) -->
  <g stroke="url(#cyan)" stroke-width="6" fill="none" stroke-linecap="square" stroke-linejoin="miter" filter="url(#glow-cyan)">
    <!-- Main Circuit Board Outline -->
    <path d="M 132 210 L 170 210 L 226 154 L 226 86 L 170 30 L 132 30" />
    
    <!-- Inner Circuit Traces -->
    <path d="M 132 90 L 165 90 L 190 115 L 190 155 L 165 180 L 132 180" />
    <path d="M 132 135 L 155 135 L 170 150" />
    <path d="M 226 120 L 195 120" />
    
    <!-- Tech Data Nodes -->
    <rect x="160" y="85" width="10" height="10" fill="url(#cyan)" />
    <rect x="185" y="150" width="10" height="10" fill="url(#cyan)" />
    <rect x="165" y="145" width="10" height="10" fill="url(#cyan)" />
    
    <!-- Central CPU/Core -->
    <rect x="140" y="115" width="12" height="12" fill="none" stroke="url(#cyan)" stroke-width="4" />
  </g>
  
  <!-- Center Connection Spine -->
  <line x1="128" y1="20" x2="128" y2="220" stroke="#ffffff" stroke-width="2" stroke-dasharray="6 6" opacity="0.3" />
  <circle cx="128" cy="120" r="4" fill="#ffffff" opacity="0.5" />
</svg>
